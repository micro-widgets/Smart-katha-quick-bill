<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Khata - Simple Ledger for Kirana</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-blue-600 text-white shadow-md p-4 sticky top-0 z-10">
        <div class="max-w-md mx-auto flex justify-between items-center gap-4">
            <div class="flex-1">
                <!-- Shop Name Input Field -->
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-store text-yellow-300"></i>
                    <input type="text" id="shop-name-input" oninput="saveShopName()" 
                        class="bg-blue-700 text-white font-bold text-lg rounded px-2 py-0.5 w-full focus:outline-none focus:ring-2 focus:ring-white/50" 
                        placeholder="My Kirana Store">
                </div>
                <p class="text-[10px] text-blue-200 ml-7">Tap above to edit shop name</p>
            </div>
            <div class="flex gap-3 shrink-0">
                <button onclick="exportData()" title="Backup Data" class="hover:text-blue-200 transition">
                    <i class="fa-solid fa-download text-lg"></i>
                </button>
                <label for="import-file" title="Restore Data" class="cursor-pointer hover:text-blue-200 transition">
                    <i class="fa-solid fa-upload text-lg"></i>
                </label>
                <input type="file" id="import-file" class="hidden" onchange="importData(event)" accept=".json">
            </div>
        </div>
    </header>

    <!-- Main Content Container -->
    <main class="flex-1 max-w-md w-full mx-auto p-4 pb-24">
        
        <!-- Quick Stats Card -->
        <div class="bg-white rounded-2xl p-4 shadow-sm mb-6 border border-slate-100 flex justify-between items-center">
            <div>
                <p class="text-xs text-slate-500 uppercase font-semibold tracking-wider">Total Credit Outstanding</p>
                <p id="total-outstanding" class="text-2xl font-black text-rose-600">₹0</p>
            </div>
            <div class="bg-rose-50 p-3 rounded-full text-rose-600">
                <i class="fa-solid fa-hand-holding-dollar text-xl"></i>
            </div>
        </div>

        <!-- Section Title: Customer List -->
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold text-slate-700">Customers</h2>
            <button onclick="toggleModal('add-customer-modal', true)" class="bg-blue-600 text-white text-xs font-semibold px-3 py-2 rounded-full flex items-center gap-1 hover:bg-blue-700 active:scale-95 transition">
                <i class="fa-solid fa-plus"></i> New Customer
            </button>
        </div>

        <!-- Empty State / Customer List -->
        <div id="customer-list" class="space-y-4">
            <!-- Dynamic customer items will render here -->
        </div>

    </main>

    <!-- Modal: Add New Customer -->
    <div id="add-customer-modal" class="fixed inset-0 bg-black/50 hidden items-end sm:items-center justify-center p-4 z-50 transition-opacity duration-300">
        <div class="bg-white w-full max-w-md rounded-t-2xl sm:rounded-2xl p-6 shadow-xl animate-slide-up">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold">Add New Customer</h3>
                <button onclick="toggleModal('add-customer-modal', false)" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <form onsubmit="handleAddCustomer(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Customer Name</label>
                    <input type="text" id="cust-name" required class="w-full px-3 py-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="e.g. Ramesh Kumar">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">WhatsApp Number (with country code)</label>
                    <input type="tel" id="cust-phone" required class="w-full px-3 py-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="e.g. 919876543210">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold active:scale-98 transition">Save Customer</button>
            </form>
        </div>
    </div>

    <!-- Modal: Add Transaction (Credit/Payment) -->
    <div id="add-transaction-modal" class="fixed inset-0 bg-black/50 hidden items-end sm:items-center justify-center p-4 z-50 transition-opacity duration-300">
        <div class="bg-white w-full max-w-md rounded-t-2xl sm:rounded-2xl p-6 shadow-xl">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h3 class="text-lg font-bold">New Transaction</h3>
                    <p id="tx-modal-subtitle" class="text-xs text-slate-500">Add entry for Customer</p>
                </div>
                <button onclick="toggleModal('add-transaction-modal', false)" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <form onsubmit="handleAddTransaction(event)" class="space-y-4">
                <input type="hidden" id="tx-cust-id">
                
                <!-- Date Field -->
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Transaction Date</label>
                    <input type="date" id="tx-date" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>

                <!-- Amount Field -->
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Amount (₹)</label>
                    <input type="number" id="tx-amount" required class="w-full text-2xl font-bold px-3 py-2 border rounded-lg text-center focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="0">
                </div>

                <!-- Note Field -->
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Item Details / Note</label>
                    <input type="text" id="tx-note" required class="w-full px-3 py-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="e.g. 5kg Rice, 1L Oil">
                </div>

                <!-- Transaction Type Toggle -->
                <div class="grid grid-cols-2 gap-3">
                    <button type="button" onclick="setTxType('credit')" id="btn-credit" class="py-3 rounded-lg font-bold border-2 border-rose-500 text-rose-500 bg-rose-50 hover:bg-rose-100 flex flex-col items-center justify-center gap-1">
                        <span class="text-xs">Customer Owed</span>
                        <span>₹ Credit (Udhaar)</span>
                    </button>
                    <button type="button" onclick="setTxType('payment')" id="btn-payment" class="py-3 rounded-lg font-bold border-2 border-slate-200 text-slate-400 hover:bg-slate-50 flex flex-col items-center justify-center gap-1">
                        <span class="text-xs">Customer Paid</span>
                        <span>₹ Received</span>
                    </button>
                </div>
                <input type="hidden" id="tx-type" value="credit">
                <button type="submit" class="w-full bg-slate-800 text-white py-3 rounded-lg font-bold active:scale-98 transition">Log Entry</button>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
                          </html>
